<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端强制禁止缩放，校园官网规范 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>湖北口回族乡初级中学 官网首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
            text-decoration: none;
        }
        body {
            background: #ffffff;
            font-family: "Microsoft YaHei", SimSun, serif;
        }

        /* 顶部导航栏 公办学校深蓝标准样式 */
        .top-nav {
            width: 100%;
            background-color: #003473;
        }
        .nav-wrap {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-wrap a {
            color: #fff;
            font-size: 16px;
            padding: 14px 20px;
            display: block;
            transition: background 0.25s ease;
        }
        .nav-wrap a:hover {
            background-color: #0052b8;
        }

        /* 顶部横幅大图（校徽校名航拍公办标一体化图片） */
        .banner-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 通用板块统一样式：简介/校园动态/红色板块共用 */
        .block-item {
            width: 100%;
            margin-top: 8px;
        }
        .block-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 参考图底部灰色空白占位区域 */
        .empty-gray-area {
            width: 100%;
            height: 300px;
            background-color: #e9e9eb;
            margin-top: 10px;
        }

        /* 移动端导航适配缩小 */
        @media (max-width: 768px) {
            .nav-wrap a {
                font-size: 14px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-nav">
        <div class="nav-wrap">
            <a href="#">首页</a>
            <a href="#intro">学校简介</a>
            <a href="#news">校园动态</a>
            <a href="#red1">红色文化课堂</a>
            <a href="#red2">民族团结红色研学</a>
            <a href="#">师资力量</a>
            <a href="#">教学教研</a>
            <a href="#">联系我们</a>
        </div>
    </div>

    <!-- 1. 顶部一体化大图：校徽+校名+拼音英文+航拍+右上角公办斜标（和参考图完全对应） -->
    <div class="banner-box">
        <img src="header_all.png" alt="学校顶部全景横幅">
    </div>

    <!-- 2. 学校简介完整板块图（参考图里简介区域整块图片） -->
    <div class="block-item" id="intro">
        <img src="intro_block.png" alt="学校简介板块">
    </div>

    <!-- 3. 新增板块1：校园动态 -->
    <div class="block-item" id="news">
        <img src="campus_news.png" alt="校园动态板块">
    </div>

    <!-- 4. 新增板块2：红色主题一 红色文化传承 -->
    <div class="block-item" id="red1">
        <img src="red_theme_1.png" alt="红色文化课堂板块">
    </div>

    <!-- 5. 新增板块3：红色主题二 回汉民族团结红色实践 -->
    <div class="block-item" id="red2">
        <img src="red_theme_2.png" alt="民族团结红色研学板块">
    </div>

    <!-- 参考图同款底部灰色空白区域 -->
    <div class="empty-gray-area"></div>
</body>
</html>
